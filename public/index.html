<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="description" content="毕业留言圣诞树：把每一句留言挂到圣诞树上" />
  <title>毕业留言圣诞树</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="fireworks" aria-hidden="true"></canvas>
  <div class="aurora" aria-hidden="true"></div>
  <div class="snow" aria-hidden="true"></div>

  <main class="app-shell">
    <section class="hero glass-card">
      <div class="hero-copy">
        <p class="eyebrow">Graduation Wish Tree</p>
        <h1>把毕业留言挂在圣诞树上</h1>
        <p class="subtitle">愿我们各自闪闪发光，也能在未来顶峰相见。</p>
        <div class="hero-actions">
          <button id="boomBtn" class="btn primary" type="button">放一场烟花</button>
          <button id="refreshBtn" class="btn ghost" type="button">刷新留言</button>
        </div>
        <div class="stats" aria-label="留言统计">
          <span><b id="wishCount">0</b> 条留言</span>
          <span id="syncStatus">正在连接 GitHub 留言库…</span>
        </div>
      </div>

      <form id="wishForm" class="wish-form" autocomplete="off">
        <h2>写一句毕业留言</h2>
        <label>
          <span>你的名字</span>
          <input id="nameInput" name="name" maxlength="16" placeholder="例如：小明" required />
        </label>
        <label>
          <span>留言内容</span>
          <textarea id="textInput" name="text" maxlength="80" rows="3" placeholder="写一句想挂在树上的话" required></textarea>
        </label>
        <input id="websiteInput" class="hidden-field" name="website" tabindex="-1" autocomplete="off" />
        <button id="submitBtn" class="btn submit" type="submit">挂到圣诞树上</button>
        <p class="form-tip">提交后 <code>data/messages.json</code>，刷新后仍然存在。</p>
      </form>
    </section>

    <section class="tree-section" aria-label="留言圣诞树区域">
      <div class="tree-tools glass-chip">
        <span>点击树上的留言可以查看大卡片</span>
        <button id="shuffleBtn" type="button">重新排列</button>
      </div>
      <div class="tree-wrap">
        <div class="tree-glow" aria-hidden="true"></div>
        <div class="tree" id="tree">
          <div class="tree-star" aria-hidden="true">★</div>
          <div class="tree-layer layer-1" aria-hidden="true"></div>
          <div class="tree-layer layer-2" aria-hidden="true"></div>
          <div class="tree-layer layer-3" aria-hidden="true"></div>
          <div class="tree-layer layer-4" aria-hidden="true"></div>
          <div class="tree-trunk" aria-hidden="true"></div>
          <div class="tree-base">2026 · 毕业快乐</div>
          <div id="treeMessages" class="tree-messages"></div>
        </div>
      </div>
    </section>

    <section class="wall glass-card">
      <div class="section-title">
        <p class="eyebrow">Message Wall</p>
        <h2>全部留言</h2>
      </div>
      <div id="messageList" class="message-list"></div>
    </section>
  </main>

  <dialog id="messageDialog" class="message-dialog">
    <button id="closeDialog" class="dialog-close" type="button" aria-label="关闭">×</button>
    <p id="dialogName" class="dialog-name"></p>
    <p id="dialogText" class="dialog-text"></p>
    <p id="dialogTime" class="dialog-time"></p>
  </dialog>

  <template id="emptyTpl">
    <div class="empty-state">还没有留言，先写第一句祝福吧。</div>
  </template>

  <script src="./script.js" defer></script>
</body>
</html>
