<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#02040d" />
  <meta name="description" content="毕业留言圣诞树：真实发射烟花、圣诞树留言挂件、手机端优化、留言写入 GitHub。" />
  <title>毕业留言圣诞树</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="trailCanvas" aria-hidden="true"></canvas>
  <canvas id="fireworkCanvas" aria-hidden="true"></canvas>
  <div class="night-sky" aria-hidden="true"><span></span><span></span><span></span></div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="page">
    <section class="hero-panel glass">
      <div class="hero-text">
        <p class="eyebrow">Graduation Wish Tree · 2026</p>
        <h1>把毕业留言挂到发光的圣诞树上</h1>
        <p class="lead">每一句祝福都会变成树上的一张小纸条。点击天空或按钮，烟花会从底部真实发射、上升、爆开、坠落。</p>
        <div class="hero-actions">
          <button id="launchBtn" class="btn primary" type="button">发射烟花</button>
          <button id="finaleBtn" class="btn ghost" type="button">连发模式</button>
          <button id="refreshBtn" class="btn ghost" type="button">刷新留言</button>
        </div>
        <div class="status-row">
          <span><b id="wishCount">0</b> 条留言</span>
          <span id="syncStatus">正在连接 GitHub 留言库…</span>
        </div>
      </div>

      <form id="wishForm" class="wish-form" autocomplete="off">
        <h2>写一句毕业留言</h2>
        <label>
          <span>你的名字</span>
          <input id="nameInput" name="name" maxlength="16" placeholder="例如：小明" required />
        </label>
        <label>
          <span>留言内容</span>
          <textarea id="textInput" name="text" maxlength="90" rows="3" placeholder="写一句想留给大家的话" required></textarea>
        </label>
        <input id="websiteInput" class="hidden-field" name="website" tabindex="-1" autocomplete="off" />
        <button id="submitBtn" class="btn submit" type="submit">挂到圣诞树上</button>
        <p class="form-tip">提交成功后写入 GitHub 的 <code>data/messages.json</code>，所有人刷新都能看到。</p>
      </form>
    </section>

    <section class="tree-stage" aria-label="留言圣诞树">
      <div class="tree-toolbar glass-chip">
        <span>点击树上的留言可以展开查看</span>
        <button id="shuffleBtn" type="button">重新排列</button>
      </div>

      <div class="tree-scene">
        <div class="moon" aria-hidden="true"></div>
        <div class="snow-ground" aria-hidden="true"></div>
        <div id="tree" class="pine-tree" aria-label="留言圣诞树">
          <div class="halo" aria-hidden="true"></div>
          <div class="star" aria-hidden="true">★</div>
          <div class="tree-shadow" aria-hidden="true"></div>
          <div id="branches" class="branches" aria-hidden="true"></div>
          <div id="lights" class="lights" aria-hidden="true"></div>
          <div id="wishTags" class="wish-tags"></div>
          <div class="trunk" aria-hidden="true"></div>
          <div class="tree-plaque">毕业快乐 · 前程似锦</div>
        </div>
      </div>
    </section>

    <section class="wall glass">
      <div class="section-head">
        <p class="eyebrow">Message Wall</p>
        <h2>全部留言</h2>
      </div>
      <div id="messageList" class="message-list"></div>
    </section>
  </main>

  <dialog id="messageDialog" class="message-dialog">
    <button id="closeDialog" class="dialog-close" type="button" aria-label="关闭">×</button>
    <p id="dialogName" class="dialog-name"></p>
    <p id="dialogText" class="dialog-text"></p>
    <p id="dialogTime" class="dialog-time"></p>
    <button id="dialogFirework" class="btn primary dialog-firework" type="button">为这句留言放烟花</button>
  </dialog>

  <template id="emptyTpl">
    <div class="empty-state">还没有留言，先写第一句祝福吧。</div>
  </template>

  <script src="./script.js" defer></script>
</body>
</html>
